<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — City Internet Admin</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/main.js"></script>
</head>
<body class="admin-body">
  <div class="admin-header">
    <div class="logo">City<span>Internet</span></div>
    <div class="admin-header-right">
      <a href="dashboard.html">Dashboard</a>
      <a href="customers.html">Customers</a>
      <a href="../index.html">View Website</a>
      <button class="logout-btn" onclick="adminLogout()">Logout</button>
    </div>
  </div>

  <div class="admin-main">
    <h1 class="page-title">Dashboard</h1>
    <p class="page-sub">Welcome back. Here's a summary of your network.</p>

    <div id="stats-row" class="stats-row">
      <!-- Stats will be injected here by JS -->
    </div>

    <div class="card">
      <div class="card-header">
        <h3 class="card-title">Customers by plan</h3>
        <a href="customers.html" style="font-size: 13px; color: var(--blue); text-decoration: none;">View all →</a>
      </div>
      <div class="card-body">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Plan</th>
                <th>Speed</th>
                <th>Price</th>
                <th>Active customers</th>
                <th>Monthly revenue</th>
              </tr>
            </thead>
            <tbody id="plan-table-body">
              <!-- Populated by JS -->
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h3 class="card-title">Recently added customers</h3>
        <a href="customers.html" style="font-size: 13px; color: var(--blue); text-decoration: none;">Manage all →</a>
      </div>
      <div class="card-body">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Customer ID</th>
                <th>Name</th>
                <th>Phone</th>
                <th>Area</th>
                <th>Plan</th>
                <th>Status</th>
                <th>Join date</th>
              </tr>
            </thead>
            <tbody id="recent-tbody">
              <!-- Populated by JS -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    checkAdminAuth();
    var PLANS = [
      { name: 'Starter',    speed: '25 Mbps',  price: 500  },
      { name: 'Fiber Plus', speed: '50 Mbps',  price: 800  },
      { name: 'Fiber Pro',  speed: '100 Mbps', price: 1200 },
      { name: 'Fiber Max',  speed: '200 Mbps', price: 2000 },
    ];
    function init() {
      var customers = loadCustomers();
      var active   = customers.filter(function(c){ return c.status === 'Active'; });
      var inactive = customers.filter(function(c){ return c.status === 'Inactive'; });
      var pending  = customers.filter(function(c){ return c.status === 'Pending'; });
      var revenue  = active.reduce(function(sum, c) {
        var p = PLANS.find(function(pl){ return pl.name === c.plan; });
        return sum + (p ? p.price : 0);
      }, 0);
      document.getElementById('stats-row').innerHTML =
        sc('Total customers', customers.length, '') +
        sc('Active',   active.length,   'green') +
        sc('Inactive', inactive.length, 'orange') +
        sc('Pending',  pending.length,  '') +
        sc('Monthly revenue', '৳' + revenue.toLocaleString(), 'blue');
      document.getElementById('plan-table-body').innerHTML = PLANS.map(function(pl) {
        var count = active.filter(function(c){ return c.plan === pl.name; }).length;
        return '<tr><td><strong>' + pl.name + '</strong></td><td>' + pl.speed + '</td><td>৳' + pl.price.toLocaleString() + '/mo</td><td>' + count + '</td><td>৳' + (count * pl.price).toLocaleString() + '</td></tr>';
      }).join('');
      document.getElementById('recent-tbody').innerHTML = customers.slice(-8).reverse().map(function(c) {
        return '<tr><td><code>' + c.id + '</code></td><td>' + c.name + '</td><td>' + c.phone + '</td><td>' + c.area + '</td><td>' + c.plan + '</td><td><span class="status-badge status-' + c.status.toLowerCase() + '">' + c.status + '</span></td><td>' + c.joinDate + '</td></tr>';
      }).join('');
    }
    function sc(label, value, color) {
      return '<div class="stat-card"><div class="stat-card-label">' + label + '</div><div class="stat-card-num' + (color ? ' ' + color : '') + '">' + value + '</div></div>';
    }
    init();
  </script>
</body>
</html>
