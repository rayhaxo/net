<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — City Internet</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="../js/main.js"></script>
</head>
<body class="login-page">
  <div class="login-box">
    <div class="login-logo">City<span>Internet</span></div>
    <div class="login-sub">Admin Panel — Staff only</div>

    <div id="login-error" class="login-error">
      Wrong password. Please try again.
    </div>

    <div class="field">
      <label for="pw-input">Password</label>
      <input type="password" id="pw-input" placeholder="Enter admin password">
    </div>

    <button class="btn-submit" onclick="doLogin()">Login to Admin Panel</button>
    
    <div style="text-align: center; margin-top: 1rem;">
      <a href="../index.html" style="font-size: 13px; color: var(--blue); text-decoration: none;">← Back to website</a>
    </div>
  </div>

  <script>
    if (sessionStorage.getItem('ci_admin_auth') === 'true') {
      window.location.href = 'dashboard.html';
    }
    function doLogin() {
      var pw = document.getElementById('pw-input').value;
      if (adminLogin(pw)) {
        window.location.href = 'dashboard.html';
      } else {
        document.getElementById('login-error').style.display = 'block';
        document.getElementById('pw-input').value = '';
        document.getElementById('pw-input').focus();
      }
    }
  </script>
</body>
</html>
